# rth host inventory — copy to ~/.config/rth/hosts.conf
# Format: shell-sourceable key=value (no spaces around =)

RTH_ENVS="mac,win,ubuntu"

# ── Mac Mini ────────────────────────────────────────────────────────
# kind=local → run on this machine (no SSH)
# kind=ssh   → SSH to another Mac
mac_kind="local"
mac_label="Mac Mini"
mac_host=""
mac_user=""
mac_port="22"
mac_workdir="$HOME/agent-ws"
mac_logdir="$HOME/agent-ws/logs"
mac_shell="bash"

# ── Windows laptop ──────────────────────────────────────────────────
# Enable OpenSSH Server; set host/user to match your LAN.
win_kind="ssh"
win_label="Windows Laptop"
win_host="192.168.1.20"
win_user="YourWindowsUser"
win_port="22"
win_workdir="C:/Users/YourWindowsUser/agent-ws"
win_logdir="C:/Users/YourWindowsUser/agent-ws/logs"
# shell: cmd | powershell
win_shell="cmd"

# ── Ubuntu on WSL (same Windows machine) ────────────────────────────
# Runs: ssh win "wsl -d <distro> -- bash -lc \"...\""  (cmd-safe; no quotes on distro)
ubuntu_kind="wsl"
ubuntu_label="Ubuntu WSL"
ubuntu_host="192.168.1.20"
ubuntu_user="YourWindowsUser"
ubuntu_port="22"
ubuntu_distro="Ubuntu"
ubuntu_workdir="~/agent-ws"
ubuntu_logdir="~/agent-ws/logs"
ubuntu_shell="bash"

# SSH options for all remote hosts
RTH_SSH_OPTS="-o ConnectTimeout=8 -o BatchMode=yes -o StrictHostKeyChecking=accept-new"
