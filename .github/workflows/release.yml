# Optional: create a GitHub Release when a v* tag is pushed.
# Bash project — attach a source tarball of scripts for offline install.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pack scripts
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          STAGE="rth-${TAG}"
          mkdir -p "$STAGE"
          cp -a bin lib config docs install.sh install.ps1 README.md LICENSE "$STAGE/"
          tar -czf "rth-${TAG}.tar.gz" "$STAGE"
          shasum -a 256 "rth-${TAG}.tar.gz" | tee "rth-${TAG}.tar.gz.sha256"
          ls -la "rth-${TAG}"*

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            rth-*.tar.gz
            rth-*.tar.gz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
